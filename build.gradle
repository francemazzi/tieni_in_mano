plugins{id 'fabric-loom' version '1.16.2'}
version=mod_version
group=maven_group
base{archivesName=archives_base_name}
loom{splitEnvironmentSourceSets();mods{tieni_in_mano{sourceSet sourceSets.main;sourceSet sourceSets.client}}}
repositories{maven{url='https://maven.fabricmc.net/'};mavenCentral()}
dependencies{minecraft "com.mojang:minecraft:$minecraft_version";mappings "net.fabricmc:intermediary:0.0.0:v2";modImplementation "net.fabricmc:fabric-loader:$loader_version"}
java{toolchain{languageVersion=JavaLanguageVersion.of(25)}}
tasks.withType(JavaCompile).configureEach{options.release=25}
processResources{inputs.property 'version',version;filesMatching('fabric.mod.json'){expand version:version}}
